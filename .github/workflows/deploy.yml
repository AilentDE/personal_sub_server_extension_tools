name: Test, publish, and deploy

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-pipeline
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/alcyoneptis/clusters-ext-tools

jobs:
  test:
    if: github.repository == 'alcyoneptis/clusters-ext-tools'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

  publish:
    if: >-
      github.repository == 'alcyoneptis/clusters-ext-tools' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: >-
      github.repository == 'alcyoneptis/clusters-ext-tools' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/master'
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      IMAGE_REF: ghcr.io/alcyoneptis/clusters-ext-tools@${{ needs.publish.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -Eeuo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST environment variable is required}"
          : "${DEPLOY_PORT:?DEPLOY_PORT environment variable is required}"
          : "${DEPLOY_USER:?DEPLOY_USER environment variable is required}"
          : "${DEPLOY_APP_DIR:?DEPLOY_APP_DIR environment variable is required}"
          : "${DEPLOY_SSH_PRIVATE_KEY:?DEPLOY_SSH_PRIVATE_KEY secret is required}"
          : "${DEPLOY_KNOWN_HOSTS:?DEPLOY_KNOWN_HOSTS secret is required}"
          [[ "${DEPLOY_PORT}" =~ ^[0-9]+$ ]]
          [[ "${DEPLOY_APP_DIR}" == /* ]]
          [[ "${IMAGE_REF}" =~ ^ghcr\.io/alcyoneptis/clusters-ext-tools@sha256:[0-9a-f]{64}$ ]]

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_ed25519"
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/id_ed25519" "${HOME}/.ssh/known_hosts"

      - name: Upload deployment files
        shell: bash
        run: |
          set -Eeuo pipefail
          scp -P "${DEPLOY_PORT}" \
            docker-compose.yml \
            scripts/deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/"

      - name: Deploy image on server
        shell: bash
        run: |
          set -Eeuo pipefail
          printf -v remote_command \
            'chmod 700 %q/deploy.sh && APP_DIR=%q %q/deploy.sh %q' \
            "${DEPLOY_APP_DIR}" \
            "${DEPLOY_APP_DIR}" \
            "${DEPLOY_APP_DIR}" \
            "${IMAGE_REF}"
          ssh -p "${DEPLOY_PORT}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "${remote_command}"
